name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bats:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Install pytest
        run: pip install -r requirements-dev.txt

      - name: Run tests (bats + pytest)
        run: ./scripts/test.sh

  bats-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bats
        run: brew install bats-core

      - name: Install pytest
        run: pip install -r requirements-dev.txt

      - name: Run tests (bats + pytest)
        run: ./scripts/test.sh
