name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          find . -type f \( -name "*.sh" -o -name "*.bats" \) ! -path "./.git/*" -exec shellcheck {} +
          shellcheck --shell=bash dot_zshrc dot_bashrc dot_profile
