name: Version Drift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 1 * *"

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run contract tests (mise config + tool version alignment)
        run: bats --jobs 1 test/mise_config_contract.bats test/version_drift.bats test/shell_config_contract.bats
