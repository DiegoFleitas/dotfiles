name: Version Drift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 1 * *"

jobs:
  check-version-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Preflight workspace diagnostics
        run: |
          pwd
          ls -la
          test -f versions.env
          test -f dot_nvmrc
          echo "dot_nvmrc: $(tr -d '[:space:]' < dot_nvmrc)"
          echo "versions.env:"
          cat versions.env

      - name: Check version drift
        run: bash scripts/check-version-drift.sh
